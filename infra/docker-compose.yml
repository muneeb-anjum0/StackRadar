services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stackradar}
      POSTGRES_USER: ${POSTGRES_USER:-stackradar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stackradar}
    ports:
      - "5432:5432"
    volumes:
      - stackradar_postgres:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stackradar -d stackradar"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  kafka:
    image: apache/kafka:3.7.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 1
    ports:
      - "9092:29092"
    volumes:
      - stackradar_kafka:/tmp/kraft-combined-logs

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    profiles: ["kafka-ui"]
    environment:
      KAFKA_CLUSTERS_0_NAME: stackradar-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8085:8080"
    depends_on:
      - kafka

  api:
    build:
      context: ../apps/api
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg2://stackradar:stackradar@postgres:5432/stackradar
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../apps/api/app:/app/app

  web:
    build:
      context: ../apps/web
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - api
    volumes:
      - ../apps/web/src:/app/src

  airflow-init:
    image: apache/airflow:2.10.4-python3.12
    profiles: ["airflow"]
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      DATABASE_URL: postgresql+psycopg2://stackradar:stackradar@postgres:5432/stackradar
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PIPELINE_MODE: ${PIPELINE_MODE:-direct}
    user: "${AIRFLOW_UID:-50000}:0"
    command: >
      bash -c "airflow db migrate &&
      airflow users create --username admin --password admin --firstname Stack --lastname Radar --role Admin --email admin@example.com || true"
    volumes:
      - ../:/opt/stackradar
      - ../pipelines/airflow_dags:/opt/airflow/dags
      - stackradar_airflow:/opt/airflow
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  airflow-webserver:
    image: apache/airflow:2.10.4-python3.12
    profiles: ["airflow"]
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      DATABASE_URL: postgresql+psycopg2://stackradar:stackradar@postgres:5432/stackradar
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PIPELINE_MODE: ${PIPELINE_MODE:-direct}
    user: "${AIRFLOW_UID:-50000}:0"
    command: webserver
    ports:
      - "8080:8080"
    volumes:
      - ../:/opt/stackradar
      - ../pipelines/airflow_dags:/opt/airflow/dags
      - stackradar_airflow:/opt/airflow
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    image: apache/airflow:2.10.4-python3.12
    profiles: ["airflow"]
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      DATABASE_URL: postgresql+psycopg2://stackradar:stackradar@postgres:5432/stackradar
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PIPELINE_MODE: ${PIPELINE_MODE:-direct}
    user: "${AIRFLOW_UID:-50000}:0"
    command: scheduler
    volumes:
      - ../:/opt/stackradar
      - ../pipelines/airflow_dags:/opt/airflow/dags
      - stackradar_airflow:/opt/airflow
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  stackradar_postgres:
  stackradar_kafka:
  stackradar_airflow:
