services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stackradar}
      POSTGRES_USER: ${POSTGRES_USER:-stackradar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stackradar}
    ports:
      - "5432:5432"
    volumes:
      - stackradar_postgres:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stackradar -d stackradar"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ../apps/api
    environment:
      DATABASE_URL: postgresql+psycopg2://stackradar:stackradar@postgres:5432/stackradar
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../apps/api/app:/app/app

  web:
    build:
      context: ../apps/web
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - api
    volumes:
      - ../apps/web/src:/app/src

volumes:
  stackradar_postgres:
